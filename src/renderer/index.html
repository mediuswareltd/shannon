<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e1e1e" />
    <title>Shannon</title>
  </head>
  <body>
    <script>
      try {
        var __t = localStorage.getItem('shannon-theme')
        if (__t === 'light' || __t === 'dark') {
          document.documentElement.dataset.theme = __t
          document.documentElement.style.colorScheme = __t === 'light' ? 'light' : 'dark'
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
